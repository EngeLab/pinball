# Pinball with the masked-diffusion (BERT-style denoising) training objective on text.
# Same architecture as pinball_wikitext.yaml; only the training objective differs.

model_type: pinball
modality: text
tokenizer_name: gpt2

text_file: ./data/wikitext_combined.txt
block_size: 1024
batch_size: 8
val_split: 0.01

train_mode: masked_diffusion   # -> train_objective_mode: masked, use_hybrid_masking: true
diffusion_mask_mode: random    # random | block | path
learning_rate: 0.0001
weight_decay: 0.1
max_steps: 20000

hidden_dim: 768
num_heads: 12
num_refinement_layers: 12
num_layers: [0, 0, 0, 0]
internal_cycles: [0, 0, 0, 0]
refinement_style: unified
unified_refinement_cycles: 1
l0_cycles: 0
iterative_refinement_cycles: 0
local_connectivity_window_size: 0
compression_ratios: [16, 4, 4]
overlap_ratios: [0.1, 0.2, 0.4]
norm_type: layernorm
dropout: 0.0

attn_backend: flash
qkv_sharing: separate
use_hqd: false
local_attn_levels: [0, 1, 2, 3]
local_attn_windows: [128, 16, 64, 128]
l0_local_window: 128
learn_edge_from_attention: false
