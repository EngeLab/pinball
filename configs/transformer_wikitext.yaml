# GPT-style transformer baseline (same data/tokenizer as the Pinball configs).

model_type: transformer
modality: text
tokenizer_name: gpt2

text_file: ./data/wikitext_combined.txt
block_size: 1024
batch_size: 8
val_split: 0.01

train_mode: ar
learning_rate: 0.0003
weight_decay: 0.1
max_steps: 20000
optimizer: muon_hybrid    # adamw | muon_hybrid (Muon on matrices, AdamW on 1D params)
muon_lr_mult: 6.0

# Transformer shape
hidden_dim: 768
num_heads: 12
transformer_n_layer: 12
transformer_ffn_type: swiglu
transformer_use_rope: true
transformer_attn_backend: auto   # auto | flash | sdpa
dropout: 0.0
